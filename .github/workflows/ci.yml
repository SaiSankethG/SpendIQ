name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Job 1: Backend Lint & Check
  backend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run backend linting
        run: |
          cd backend
          pip install flake8 black
          black app --check || true
          flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics
      
      - name: Check backend structure
        run: |
          cd backend
          python -c "from app.main import app; print('✅ Backend imports OK')"

  # Job 2: Frontend Build & Type Check
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install
      
      - name: Run type check
        run: |
          cd frontend
          npx tsc --noEmit
      
      - name: Build frontend
        run: |
          cd frontend
          npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/

  # Job 3: Playwright E2E Tests
  e2e-tests:
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-build]
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: expense_tracker
          POSTGRES_USER: expense_user
          POSTGRES_PASSWORD: expense_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      
      - name: Start backend server
        env:
          DATABASE_URL: postgresql://expense_user:expense_password@localhost:5432/expense_tracker
          PYTHONUNBUFFERED: 1
        run: |
          cd backend
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -f http://localhost:8000/health || echo "Backend not ready yet"
      
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install
      
      - name: Install Playwright browsers
        run: |
          cd frontend
          npx playwright install --with-deps
      
      - name: Start frontend dev server
        run: |
          cd frontend
          npm run dev &
          sleep 15
          curl -f http://localhost:5173 || echo "Frontend not ready yet"
      
      - name: Run Playwright tests
        run: |
          cd frontend
          npx playwright test --reporter=html,json,list
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30
      
      - name: Upload test videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-videos-${{ github.run_id }}
          path: frontend/test-results/
          retention-days: 7
      
      - name: Comment test results on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Try to read test results
            let summary = '## 🧪 Test Results\n\n';
            
            try {
              if (fs.existsSync('frontend/test-results/results.json')) {
                const results = JSON.parse(fs.readFileSync('frontend/test-results/results.json', 'utf8'));
                const stats = results.stats;
                summary += `✅ Passed: ${stats.expected}\n`;
                summary += `❌ Failed: ${stats.unexpected}\n`;
                summary += `⏭️ Skipped: ${stats.skipped}\n`;
              }
            } catch (e) {
              summary += 'Report available in artifacts\n';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary + '\n[📊 View full report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})'
            });

  # Job 4: Security Check
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run security checks
        run: |
          echo "Running security checks..."
          # Add your security scanning tools here
          # Examples: bandit, safety, npm audit
          cd backend && pip install bandit && bandit -r app || true
          cd ../frontend && npm audit || true

  # Job 5: Build Docker Images (Only on main)
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-build, e2e-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
      
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
      
      - name: Extract metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
      
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}

  # Job 6: Deployment (Optional - Configure based on your hosting)
  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy notification
        run: |
          echo "🚀 Deployment ready!"
          echo "Configure your deployment step here"
          echo "- Push to container registry: ✅ Done"
          echo "- Build Docker images: ✅ Done"
          echo "- Next: Deploy to your infrastructure"
          
      # Add your deployment logic here
      # Example: Deploy to AWS, GCP, Azure, Kubernetes, etc.
